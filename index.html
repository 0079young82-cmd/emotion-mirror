<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>내 감정 거울</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F13;--s1:#16161F;--s2:#1E1E28;--s3:#252530;
  --bd:#2A2A38;--bd2:#3A3A50;
  --t:#E2DAD0;--t2:#9090A8;--t3:#5A5A70;
  --blue:#6B9FD4;--bluebg:#0D1A28;--bluebd:#1A3050;
  --green:#5A9E7A;--greenbg:#0A1A12;--greenbd:#1A4030;
  --purple:#9B7ED4;--purplebg:#140F28;--purplebd:#2A1A50;
  --amber:#D4A45A;--amberbg:#1A1200;--amberbd:#403000;
  --red:#D47070;--r:10px;
}
body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:15px}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 80px}
.header{padding:24px 0 8px;border-bottom:1px solid var(--bd);margin-bottom:20px}
.eyebrow{font-size:10px;letter-spacing:3px;color:var(--t3);margin-bottom:6px}
.title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:400}
.subtitle{font-size:12px;color:var(--t3);margin-top:4px}
.tab-bar{display:flex;border-bottom:1px solid var(--bd);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tab.on{color:var(--t);border-bottom-color:var(--blue)}
.slabel{font-size:10px;letter-spacing:2px;color:var(--t3);margin-bottom:10px}
textarea{width:100%;min-height:130px;padding:14px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);color:var(--t);font-size:15px;font-family:'Noto Serif KR',serif;line-height:1.9;resize:none}
textarea:focus{outline:none;border-color:var(--bd2)}
.btn-main{width:100%;padding:15px;margin-top:10px;background:var(--bluebg);border:1px solid var(--bluebd);border-radius:var(--r);color:var(--blue);font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:background .2s}
.btn-main:hover{background:var(--bluebd)}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px}
.card.blue{background:var(--bluebg);border-color:var(--bluebd)}
.card.green{background:var(--greenbg);border-color:var(--greenbd)}
.card.purple{background:var(--purplebg);border-color:var(--purplebd)}
.card.amber{background:var(--amberbg);border-color:var(--amberbd)}
.clabel{font-size:10px;letter-spacing:2px;color:var(--t3);margin-bottom:10px}
.ctext{font-size:14px;line-height:1.9;color:var(--t2)}
.ehead{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.edot{width:42px;height:42px;border-radius:50%;flex-shrink:0}
.ename{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:400}
.esub{font-size:12px;color:var(--t3);margin-top:3px;line-height:1.6}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;background:var(--s2);border:1px solid var(--bd);color:var(--t2);margin:3px 3px 3px 0}
.ntag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;background:var(--greenbg);color:var(--green);border:1px solid var(--greenbd);margin:2px}
.quote{font-family:'Noto Serif KR',serif;font-size:14px;font-style:italic;line-height:2;color:var(--t2);border-left:3px solid var(--purple);padding:12px 16px;margin:10px 0;background:var(--purplebg);border-radius:0 8px 8px 0}
.belief{padding:12px 14px;border-radius:8px;background:var(--purplebg);border:1px solid var(--purplebd);margin:10px 0}
.belief-l{font-size:10px;letter-spacing:2px;color:var(--purple);margin-bottom:4px}
.belief-t{font-size:14px;color:var(--purple);font-style:italic}
.rq{padding:12px 14px;border-radius:8px;background:var(--amberbg);border:1px solid var(--amberbd);color:var(--amber);font-size:14px;line-height:1.8;margin:8px 0 6px}
.rta{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--t);font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:none;line-height:1.7;margin-bottom:4px}
.rta:focus{outline:none;border-color:var(--bd2)}
.btn-sm{padding:8px 16px;border:1px solid var(--bd2);border-radius:8px;background:var(--s2);color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit}
.btn-sm:hover{background:var(--s3)}
.btn-del{border-color:var(--red);color:var(--red);background:transparent}
.ri{padding:16px;border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;background:var(--s1);cursor:pointer}
.ri-date{font-size:10px;color:var(--t3);margin-bottom:6px}
.ri-em{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px}
.ri-sit{font-size:12px;color:var(--t3);margin-top:4px;line-height:1.6}
.ri-det{display:none;margin-top:14px;border-top:1px solid var(--bd);padding-top:14px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:400px){.dgrid{grid-template-columns:1fr}}
.dc{padding:14px;border-radius:var(--r);border:1px solid var(--bd);background:var(--s1);cursor:pointer;border-left-width:3px}
.dc:hover{background:var(--s2)}
.dn{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--t)}
.dd{font-size:12px;color:var(--t3);line-height:1.6}
.dx{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.dc.open .dx{display:block}
.bw{margin:8px 0}
.br{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:4px}
.bb{background:var(--s2);border-radius:4px;height:6px;overflow:hidden}
.bf{height:6px;border-radius:4px;transition:width .8s}
.fade-in{animation:fi .5s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.keyword-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.kbtn{padding:8px 14px;border-radius:20px;border:1px solid var(--bd);background:var(--s1);color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.kbtn:hover,.kbtn.sel{background:var(--bluebg);border-color:var(--bluebd);color:var(--blue)}
.step-indicator{display:flex;gap:6px;margin-bottom:16px}
.si{width:8px;height:8px;border-radius:50%;background:var(--bd)}
.si.on{background:var(--blue)}
.si.done{background:var(--green)}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <div class="eyebrow">감정 내면 탐색기</div>
  <div class="title">내 감정 거울</div>
  <div class="subtitle">감정의 이름 · 뿌리 · 수용 · 중재 · 성찰 — 누구나 바로 사용</div>
</div>

<div class="tab-bar">
  <button class="tab on" onclick="showTab('analyze',this)">감정 분석</button>
  <button class="tab" onclick="showTab('records',this)">기록·성찰</button>
  <button class="tab" onclick="showTab('dict',this)">감정 사전</button>
  <button class="tab" onclick="showTab('insight',this)">나의 패턴</button>
</div>

<div id="tab-analyze">
  <div class="slabel">지금 어떤 감정이 느껴지나요? 키워드를 골라보세요</div>
  <div class="keyword-btns" id="keyword-area"></div>
  <div class="slabel" style="margin-top:4px">또는 지금 상황을 자유롭게 써주세요</div>
  <textarea id="situation" placeholder="오늘 있었던 일, 몸에서 느껴지는 것, 머릿속을 맴도는 장면...&#10;판단 없이 그대로 써주세요."></textarea>
  <button class="btn-main" onclick="startAnalysis()">내 감정 들여다보기</button>
  <div id="result-area" style="margin-top:16px"></div>
</div>

<div id="tab-records" style="display:none">
  <div class="slabel">쌓인 감정 기록</div>
  <div id="records-list"></div>
  <div id="no-records" style="text-align:center;padding:3rem;color:var(--t3);font-size:14px;line-height:2">아직 기록이 없어요.<br>감정 분석을 하면 자동으로 저장돼요.</div>
</div>

<div id="tab-dict" style="display:none">
  <div class="slabel">감정 사전 — 탭하면 뿌리가 열려요</div>
  <div id="dict-area"></div>
</div>

<div id="tab-insight" style="display:none">
  <div class="slabel">나의 감정 패턴</div>
  <div id="insight-area"></div>
</div>
</div>

<script>
const SK='emr_v4';

const EDICT={
  '기본감정':{
    '기쁨':{c:'#F5C842',root:'내가 원하고 소중히 여기는 것이 충족됨',needs:['성취','연결','즐거움'],body:'가슴이 열리는 느낌, 어깨가 가벼워짐',belief:'나는 행복할 자격이 있다',keywords:['기쁘다','좋다','설렌다','행복하다','즐겁다','신난다'],med:'지금 이 감정을 충분히 느끼세요. 기쁨은 빨리 지나가니 머물러 주세요.',questions:['이 기쁨을 만든 것은 무엇인가요?','이 순간을 어떻게 기억하고 싶나요?','나에게 기쁨을 주는 것이 또 무엇이 있을까요?'],care:'오늘 당신은 충분히 빛나고 있어요.',quotes:['기쁨은 미래가 아니라 지금 이 순간에 있다. — 틱낫한','온전히 살아있다는 증거가 바로 이 기쁨이다.']},
    '슬픔':{c:'#5B8EC7',root:'소중한 것의 상실 또는 연결의 단절',needs:['애도','위로','이해'],body:'가슴이 무겁고 조여드는 느낌, 눈물이 차오름',belief:'나는 상실을 경험했다',keywords:['슬프다','눈물난다','허탈하다','그립다','아프다','상실'],med:'슬픔을 서두르지 마세요. 울고 싶으면 우세요.',questions:['무엇이 가장 그리운가요?','이 슬픔이 내게 전하는 말은 무엇일까요?','지금 나에게 필요한 위로는 무엇인가요?'],care:'당신의 슬픔은 사랑했다는 증거예요.',quotes:['슬픔은 사랑했다는 증거다. 그 깊이만큼 당신은 연결되어 있었다.','눈물은 약함이 아니라 오랫동안 강했다는 표시다.']},
    '분노':{c:'#D94F4F',root:'나의 가치·경계·기대가 침범되거나 무시됨',needs:['존중','공정','자율성'],body:'얼굴이 달아오름, 턱이나 주먹에 힘이 들어감',belief:'나의 경계가 무시당했다',keywords:['화난다','짜증난다','억울하다','불공평하다','화가치민다','열받는다'],med:'잠깐 멈추고 깊게 세 번 숨을 쉬세요. 분노 아래 상처나 두려움이 있는지 들여다보세요.',questions:['무엇이 가장 억울한가요?','이 상황에서 내가 원했던 것은 무엇인가요?','분노 아래 어떤 감정이 숨어있을까요?'],care:'당신의 경계는 지킬 가치가 있어요.',quotes:['분노는 "나는 소중하다"는 선언이다.','경계를 지키는 것은 이기심이 아니라 자기존중이다.']},
    '두려움':{c:'#8B6BD4',root:'안전·통제·예측 가능성이 위협받음',needs:['안전','확신','보호'],body:'심장이 빨리 뜀, 위장이 조여드는 느낌',belief:'지금 내가 위협받고 있다',keywords:['무섭다','두렵다','무서워','겁난다','불안하다','떨린다'],med:'지금 발바닥이 바닥에 닿아있는 것을 느끼세요. 호흡을 느리게 하면 신경계가 안정됩니다.',questions:['지금 실제로 위험한 것은 무엇인가요?','두려움이 나를 보호하려는 것은 무엇인가요?','안전하다고 느끼려면 무엇이 필요한가요?'],care:'지금 이 순간, 당신은 충분히 안전해요.',quotes:['두려움이 있는 곳에 용기가 필요한 곳이 있다.','두려움을 인정하는 것이 두려움을 가장 빨리 통과하는 길이다.']},
    '불안':{c:'#E8923A',root:'미래의 불확실성, 충분하지 않다는 느낌',needs:['확실성','준비','신뢰'],body:'가슴이 답답하고 호흡이 얕아짐, 손발이 차가워짐',belief:'앞으로 잘 될지 모르겠다',keywords:['불안하다','걱정된다','긴장된다','초조하다','막막하다','답답하다'],med:'5가지 보이는 것, 4가지 만져지는 것을 확인하세요. 지금 이 순간으로 돌아오세요.',questions:['무엇이 가장 걱정되나요?','최악의 상황이 생겨도 내가 할 수 있는 것은?','지금 내가 통제할 수 있는 것은 무엇인가요?'],care:'지금 이 순간 당신은 충분히 잘 하고 있어요.',quotes:['불안은 미래에 살고 있는 나를 현재로 데려오라는 신호다.','지금 이 순간, 당신은 충분히 안전하다.']},
    '수치심':{c:'#8B6347',root:'내 존재 자체가 결함이 있다는 내면의 믿음',needs:['수용','소속','자기가치'],body:'얼굴이 뜨거워짐, 몸이 작아지고 숨고 싶어짐',belief:'나는 부족한 사람이다',keywords:['창피하다','부끄럽다','민망하다','쪽팔리다','숨고싶다','한심하다'],med:'수치심은 혼자 있을 때 커집니다. 신뢰하는 한 사람에게 나누어보세요.',questions:['이 수치심은 언제부터 있었나요?','어린 나에게도 이렇게 말할 수 있나요?','내가 정말 결함이 있는 건지, 실수를 한 건지 구분해보세요.'],care:'당신은 당신의 실수가 아니에요.',quotes:['수치심은 당신이 나쁜 사람이 아니라 상처받았다는 신호다. — 브레네 브라운','당신은 당신의 실수가 아니다.']},
    '죄책감':{c:'#4A7A4A',root:'나의 행동이 나의 가치관에 어긋났다는 인식',needs:['회복','용서','책임'],body:'명치 부근의 무거움, 속이 쓰린 느낌',belief:'내가 잘못했다',keywords:['미안하다','죄송하다','후회된다','잘못했다','죄책감','내탓'],med:'무엇을 잘못했는지 명확히 하세요. 할 수 있는 것을 하고 나머지는 내려놓으세요.',questions:['내가 실제로 한 것과 하지 않은 것을 구분해보세요.','지금 내가 할 수 있는 것은 무엇인가요?','나 자신을 용서할 준비가 되어있나요?'],care:'잘못을 아는 것이 이미 성장이에요.',quotes:['잘못을 아는 것이 이미 성장이다. 자책과 책임은 다르다.','스스로를 용서하는 것이 가장 어렵고 가장 중요하다.']},
    '외로움':{c:'#4A7FB5',root:'진정한 이해·소속·친밀함의 결핍',needs:['연결','이해','소속'],body:'가슴 중앙의 텅 빈 느낌, 몸이 축 처짐',belief:'나는 혼자다',keywords:['외롭다','쓸쓸하다','혼자다','고독하다','아무도없다','공허하다'],med:'지금 당장 연결될 수 있는 가장 작은 방법을 찾아보세요.',questions:['어떤 연결이 그리운가요?','나 자신과는 얼마나 연결되어 있나요?','지금 나에게 손을 내밀 수 있는 사람은 누구인가요?'],care:'당신 자신과 먼저 연결될 때, 진정한 연결이 가능해져요.',quotes:['외로움은 연결을 원한다는 뜻이다. 그 마음이 살아있다는 증거다.','당신 자신과 먼저 연결될 때, 진정한 연결이 가능해진다.']},
  },

function gc(n){for(const c of Object.values(EDICT))if(c[n])return c[n].c;return'#888'}
function gd(n){for(const c of Object.values(EDICT))if(c[n])return c[n];return null}

for(const emotions of Object.values(EDICT))
  for(const[name,data] of Object.entries(emotions))
    data.keywords.forEach(k=>allKeywords.push({k,name}));

const shown=allKeywords.sort(()=>Math.random()-.5).slice(0,16);

shown.forEach(({k,name})=>{
  const b=document.createElement('button');
  b.className='kbtn';b.textContent=k;
  b.onclick=()=>{
    document.querySelectorAll('.kbtn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');

});

function showTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['analyze','records','dict','insight'].forEach(id=>{
    const el=document.getElementById('tab-'+id);
    if(el)el.style.display=id===t?'':'none';
  });
  if(t==='records')renderRecords();
  if(t==='dict')renderDict();
  if(t==='insight')renderInsight();
}

let cur=null;

function analyzeText(text){
  const t=text.toLowerCase();
  const scores={};
  for(const[cat,emotions] of Object.entries(EDICT)){
    for(const[name,data] of Object.entries(emotions)){
      let score=0;
      data.keywords.forEach(k=>{if(t.includes(k))score+=3});
      const words=['힘들','지쳐','아파','무서','걱정','슬퍼','화나','억울','외로','공허','무기력','불안','죄책','수치','번아웃'];
      words.forEach(w=>{if(t.includes(w)&&name.includes(w.slice(0,2)))score+=1});
      if(score>0)scores[name]=score;
    }
  }
  if(Object.keys(scores).length===0){
    const defaults=['불안','번아웃','과부하','자기비판','외로움'];
    const pick=defaults[Math.floor(Math.random()*defaults.length)];
    scores[pick]=1;
  }
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];
  const secondary=sorted.slice(1,3).map(x=>x[0]);
  const pd=gd(primary);
  const hiddenMap={
    '분노':'두려움','번아웃':'슬픔','자기비판':'수치심',
    '과부하':'불안','억울함':'슬픔','공감피로':'외로움',
    '슈퍼우먼증후군':'두려움','사명감소진':'공허함',
    '무기력':'슬픔','불안':'두려움'
  };
  const hidden=hiddenMap[primary]||secondary[0]||'슬픔';
  return{primary,secondary,hidden,data:pd};
}

    <div style="font-size:10px;color:var(--t3);margin-bottom:8px">지금 바로 할 수 있는 작은 행동</div>
    <div style="padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px;color:var(--t);display:flex;gap:10px"><span style="color:var(--t3);flex-shrink:0">1</span><span>숨을 깊게 세 번 쉬기 — 들이쉬고 4초, 내쉬고 6초</span></div>
    <div style="padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px;color:var(--t);display:flex;gap:10px"><span style="color:var(--t3);flex-shrink:0">2</span><span>지금 느끼는 감정을 한 문장으로 소리내어 말해보기</span></div>
    <div style="padding:10px 0;font-size:13px;color:var(--t);display:flex;gap:10px"><span style="color:var(--t3);flex-shrink:0">3</span><span>${pd.med.split('.')[0]}</span></div>
  </div>

  <div class="card blue">
    <div class="clabel">⑤ 자신에게 보내는 말</div>
    <div style="font-family:'Noto Serif KR',serif;font-size:16px;color:var(--blue);line-height:2">${pd.care}</div>
  </div>

  <div class="card">
    <div class="clabel">성찰 질문 — 오늘 자신에게 물어보기</div>
    ${pd.questions.map((q,i)=>`
    <div class="rq">Q${i+1}. ${q}</div>
    <textarea class="rta" rows="2" placeholder="자유롭게 써보세요..." id="rq-${i}"></textarea>
    `).join('')}
    <button class="btn-sm" style="margin-top:10px" onclick="saveRef()">성찰 답변 저장</button>
    <span id="smsg" style="font-size:12px;color:var(--green);margin-left:10px;display:none">저장됨 ✓</span>
  </div>
  </div>`;

  records.unshift({...cur});
  if(records.length>100)records=records.slice(0,100);
  save();
}

function saveRef(){
  if(!cur)return;
  cur.reflections=[];
  if(cur.data&&cur.data.questions)cur.data.questions.forEach((_,i)=>{
    const el=document.getElementById('rq-'+i);
    cur.reflections[i]=el?el.value:'';
  });
  const idx=records.findIndex(r=>r.date===cur.date);
  if(idx>=0)records[idx]=cur;else records.unshift(cur);
  save();
  const m=document.getElementById('smsg');
  if(m){m.style.display='inline';setTimeout(()=>m.style.display='none',2000)}
}

function renderRecords(){
  const el=document.getElementById('records-list');
  const no=document.getElementById('no-records');
  if(!records.length){el.innerHTML='';no.style.display='block';return}
  no.style.display='none';
  el.innerHTML=records.map((r,i)=>{
    const color=gc(r.primary);
    const hr=r.reflections&&r.reflections.some(x=>x&&x.trim());
    return`<div class="ri" onclick="toggleRec(${i})">
      <div class="ri-date">${r.date||''} ${hr?'<span style="color:var(--green);font-size:10px">· 성찰 기록 있음</span>':''}</div>
      <div class="ri-em">
        <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
        ${r.primary||''}
        ${r.secondary?r.secondary.map(s=>`<span style="font-size:11px;color:var(--t3)">· ${s}</span>`).join(''):''}
      </div>
      <div class="ri-sit">${(r.situation||'').substring(0,60)}${(r.situation||'').length>60?'...':''}</div>
      <div class="ri-det" id="rd-${i}">
        ${r.data?`<div style="font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:10px">${r.data.root}</div>`:''}
        ${r.data?`<div class="belief" style="margin-bottom:10px"><div class="belief-l">무의식적 믿음</div><div class="belief-t">"${r.data.belief}"</div></div>`:''}
        ${hr&&r.data&&r.data.questions?r.data.questions.map((q,qi)=>r.reflections[qi]?`
        <div style="margin:8px 0"><div style="font-size:11px;color:var(--t3);margin-bottom:3px">${q}</div>
        <div style="font-size:13px;color:var(--t);line-height:1.7">${r.reflections[qi]}</div></div>`:'').join(''):''}
        <button class="btn-sm btn-del" style="margin-top:10px" onclick="delRec(${i},event)">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function toggleRec(i){
  const el=document.getElementById('rd-'+i);
  if(el)el.style.display=el.style.display==='block'?'none':'block';
}
function delRec(i,e){
  e.stopPropagation();
  if(!confirm('이 기록을 삭제할까요?'))return;
  records.splice(i,1);save();renderRecords();
}

function renderDict(){
  const el=document.getElementById('dict-area');
  let h='';
  for(const[cat,emotions] of Object.entries(EDICT)){
    h+=`<div style="margin-bottom:1.5rem"><div class="slabel" style="margin-bottom:10px">${cat}</div><div class="dgrid">`;
    for(const[name,data] of Object.entries(emotions)){
      h+=`<div class="dc" style="border-left-color:${data.c}" onclick="this.classList.toggle('open')">
        <div class="dn">${name}</div>
        <div class="dd">${data.root}</div>
        <div class="dx">
          <div style="font-size:11px;color:var(--t3);margin-bottom:6px">몸: ${data.body}</div>
          <div style="font-size:11px;color:var(--purple);font-style:italic;margin-bottom:6px">"${data.belief}"</div>
          <div>${data.needs.map(n=>`<span class="ntag">${n}</span>`).join('')}</div>
          <div class="quote" style="font-size:12px;margin-top:8px">${data.quotes[0]}</div>
        </div>
      </div>`;
    }
    h+='</div></div>';
  }
  el.innerHTML=h;
}

function renderInsight(){
  const el=document.getElementById('insight-area');
  if(!records.length){
    el.innerHTML='<div style="text-align:center;padding:3rem;color:var(--t3);font-size:14px;line-height:2">기록이 쌓이면<br>나의 감정 패턴을 볼 수 있어요.</div>';
    return;
  }
  const cnt={},bmap={};
  records.forEach(r=>{
    if(r.primary)cnt[r.primary]=(cnt[r.primary]||0)+1;
    if(r.data&&r.data.belief){const b=r.data.belief.trim();bmap[b]=(bmap[b]||0)+1}
  });
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const mx=sorted[0]?sorted[0][1]:1;
  const tob=Object.entries(bmap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  let h=`<div class="card" style="margin-bottom:12px">
    <div class="clabel">자주 나타나는 감정 (총 ${records.length}회 기록)</div>
    ${sorted.map(([n,c])=>`
    <div class="bw">
      <div class="br"><span>${n}</span><span>${Math.round(c)}회</span></div>
      <div class="bb"><div class="bf" style="width:${Math.round(c/mx*100)}%;background:${gc(n)}"></div></div>
    </div>`).join('')}
  </div>`;
  if(tob.length)h+=`<div class="card purple">
    <div class="clabel">반복되는 무의식적 믿음</div>
    ${tob.map(([b,c])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--purplebd)">
      <span style="font-size:13px;color:var(--purple);font-style:italic">"${b}"</span>
      <span style="font-size:11px;color:var(--t3)">${c}회</span>
    </div>`).join('')}
  </div>`;
  if(sorted[0]){
    const td=gd(sorted[0][0]);
    h+=`<div class="card amber">
      <div class="clabel">성찰 노트</div>
      <div class="ctext">가장 자주 나타나는 감정은 <strong style="color:var(--amber)">${sorted[0][0]}</strong>이에요.<br>
      ${td?`뿌리: ${td.root}`:''}
      ${tob[0]?`<br><br>핵심 믿음 패턴: <em>"${tob[0][0]}"</em>`:''}</div>
    </div>`;
  }
  h+=`<div style="margin-top:16px;padding:14px;border:1px dashed var(--bd);border-radius:var(--r)">
    <div style="font-size:11px;color:var(--t3);margin-bottom:8px">데이터 관리</div>
    <button class="btn-sm" onclick="exportData()">기록 내보내기</button>
    <button class="btn-sm btn-del" style="margin-left:8px" onclick="clearAll()">전체 삭제</button>
  </div>`;
  el.innerHTML=h;
}

function exportData(){
  const b=new Blob([JSON.stringify(records,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=`emotion-mirror-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(u);
}
function clearAll(){
  if(!confirm('모든 기록을 삭제할까요?'))return;
  records=[];save();renderInsight();
}
</script>
</body>
</html>
